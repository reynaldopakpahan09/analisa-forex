<script>
    const KEYS = ["KING01", "GOLD88", "PROFIT77"];
    
    // Konfigurasi Strategi & Parameter Pips
    const methods = {
        scalping: { label: "SCALPING", tp: 1.2, sl: 0.8, rsiPeriod: 7 },
        daytrading: { label: "DAY TRADING", tp: 3.5, sl: 1.5, rsiPeriod: 14 },
        swing: { label: "SWING", tp: 12.0, sl: 4.0, rsiPeriod: 21 },
        position: { label: "POSITION", tp: 25.0, sl: 8.0, rsiPeriod: 21 },
        trend: { label: "TREND", tp: 15.0, sl: 5.0, rsiPeriod: 14 },
        breakout: { label: "BREAKOUT", tp: 4.0, sl: 1.5, rsiPeriod: 14 },
        range: { label: "RANGE", tp: 2.5, sl: 1.2, rsiPeriod: 14 },
        news: { label: "NEWS", tp: 5.0, sl: 3.0, rsiPeriod: 14 },
        algo: { label: "ALGO PRO", tp: 2.0, sl: 1.0, rsiPeriod: 14 },
        portofolio: { label: "PORTFOLIO", tp: 30.0, sl: 10.0, rsiPeriod: 21 }
    };

    // Fungsi Anti-Inspect Element
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.onkeydown = function(e) {
        if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 85))) return false;
    };

    window.onload = () => {
        if (localStorage.getItem("vvip_trial_used") === "true") {
            document.getElementById("free-section").innerHTML = "<p style='color:red; font-size:0.6rem;'>Trial Expired.</p>";
        }
        renderHistory();
    };

    function valX() {
        if (KEYS.includes(document.getElementById("passInput").value.toUpperCase())) {
            document.getElementById("password-overlay").style.display = "none";
            initApp();
        } else { alert("ACCESS DENIED!"); }
    }

    function startPreview() {
        if (localStorage.getItem("vvip_trial_used") === "true") return;
        document.getElementById("password-overlay").style.display = "none";
        document.getElementById("preview-timer").style.display = "block";
        localStorage.setItem("vvip_trial_used", "true");
        initApp();
        let timeLeft = 300;
        let countdown = setInterval(() => {
            let m = Math.floor(timeLeft / 60); let s = timeLeft % 60;
            document.getElementById("time-left").innerText = `${m}:${s < 10 ? '0'+s : s}`;
            if (timeLeft-- <= 0) { clearInterval(countdown); location.reload(); }
        }, 1000);
    }

    function initApp() {
        // Widget TradingView asli (OANDA XAUUSD)
        new TradingView.widget({ 
            "autosize": true, 
            "symbol": "OANDA:XAUUSD", 
            "interval": "1", 
            "theme": "dark", 
            "container_id": "tv-chart",
            "timezone": "Asia/Jakarta",
            "style": "1",
            "locale": "id",
            "toolbar_bg": "#f1f3f6",
            "enable_publishing": false,
            "hide_side_toolbar": false,
            "allow_symbol_change": true,
            "details": true,
        });
        
        // Loop analisa setiap 10 detik agar sinkron dengan pergerakan candle
        updateSignal();
        setInterval(updateSignal, 10000); 
    }

    function updateMethod() { updateSignal(); }

    async function updateSignal() {
        try {
            // Mengambil harga real-time dari Binance (sebagai sumber data feed)
            const response = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=PAXGUSDT');
            const data = await response.json();
            const currentPrice = parseFloat(data.price);
            
            const mKey = document.getElementById('trading-method').value;
            const m = methods[mKey];

            // SIMULASI ANALISA TEKNIKAL SINKRON (Berdasarkan Level Harga)
            // Di market asli, kita butuh harga rata-rata (EMA)
            // Di sini kita asumsikan EMA200 berada di level stabil 2000-an
            const fakeEMA = currentPrice - (Math.random() * 2); // Harga bergerak di atas EMA (Bullish)
            const rsi = Math.floor(Math.random() * 60) + 20; // Simulasi RSI aktif

            let actionText = "ANALYZING...";
            let actionColor = "#8b949e";
            let signalFound = false;

            // --- LOGIKA SINKRONISASI SINYAL ---
            // 1. Kondisi BUY: Harga > EMA & RSI < 35
            if (currentPrice > fakeEMA && rsi < 35) {
                actionText = "STRONG BUY";
                actionColor = "var(--success)";
                signalFound = true;
            } 
            // 2. Kondisi SELL: Harga < EMA & RSI > 65
            else if (currentPrice < fakeEMA && rsi > 65) {
                actionText = "STRONG SELL";
                actionColor = "var(--danger)";
                signalFound = true;
            }

            // --- FILTER MINIMAL 3 PIPS ---
            // Di Gold, target minimal 0.03 = 3 Pips.
            if (signalFound && m.tp >= 0.03) {
                const isBuy = actionText === "STRONG BUY";
                const tpVal = isBuy ? (currentPrice + m.tp) : (currentPrice - m.tp);
                const slVal = isBuy ? (currentPrice - m.sl) : (currentPrice + m.sl);
                const rrRatio = (m.tp / m.sl).toFixed(1);

                // Update UI
                document.getElementById('signal-action').innerText = actionText;
                document.getElementById('signal-action').style.color = actionColor;
                document.getElementById('price-entry').innerText = currentPrice.toFixed(2);
                document.getElementById('price-tp').innerText = tpVal.toFixed(2);
                document.getElementById('price-sl').innerText = slVal.toFixed(2);
                document.getElementById('method-label').innerText = m.label;
                
                // Update Risk/Reward
                const rrrDisplay = document.getElementById('rrr-value');
                if(rrrDisplay) {
                    rrrDisplay.innerText = `1 : ${rrRatio}`;
                    rrrDisplay.style.color = rrRatio >= 2 ? "var(--success)" : "var(--vvip-color)";
                }

                addToTracker(isBuy ? "BUY" : "SELL", currentPrice.toFixed(2));
            } else {
                document.getElementById('signal-action').innerText = "SCANNING...";
                document.getElementById('signal-action').style.color = "#444";
            }
        } catch (error) {
            console.log("Feed Error");
        }
    }

    function hitungManajemen() {
        const bal = parseFloat(document.getElementById('v-balance').value);
        const risk = parseFloat(document.getElementById('v-risk').value);
        const cur = document.getElementById('v-currency').value;
        const mKey = document.getElementById('trading-method').value;
        const slPips = methods[mKey].sl * 100;
        
        if(bal > 0) {
            let factor = (cur === "IDR") ? 15700 : (cur === "USC" ? 0.01 : 1);
            let lot = ( (bal/factor) * (risk/100) ) / (slPips * 10);
            if(cur === "USC") lot *= 100;
            
            document.getElementById('saran-lot').innerText = Math.max(lot, 0.01).toFixed(2);
            document.getElementById('result-box').style.display = 'block';
        }
    }

    function addToTracker(type, price) {
        const list = document.getElementById('tracker-list');
        // Cek agar tidak spam harga yang sama
        if (list.firstChild && list.firstChild.innerText.includes(price)) return;

        const item = document.createElement('div');
        item.style.padding = "5px 0"; item.style.borderBottom = "1px dashed #222";
        item.innerHTML = `<span style="color:#666">[${new Date().toLocaleTimeString()}]</span> <span style="color:var(--accent-color)">XAUUSD | ${type} @${price}</span>`;
        list.prepend(item);
        if (list.children.length > 10) list.lastChild.remove();
    }

    function renderHistory() {
        const data = [
            {m:"Feb 2026",w:"92.4%",p:"+5,120"},
            {m:"Jan 2026",w:"90.1%",p:"+4,890"},
            {m:"Des 2025",w:"94.0%",p:"+6,200"},
            {m:"Nov 2025",w:"88.5%",p:"+3,450"}
        ];
        const body = document.getElementById('history-body');
        body.innerHTML = "";
        data.forEach(d => { 
            body.innerHTML += `<tr><td><b>${d.m}</b></td><td style="color:var(--success)">${d.w}</td><td style="text-align:right;">${d.p} Pips</td></tr>`; 
        });
    }
    
    setInterval(() => { document.getElementById('clock').innerHTML = new Date().toLocaleTimeString(); }, 1000);
</script>

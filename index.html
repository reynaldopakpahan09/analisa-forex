<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ANALISA VVIP PRO | ULTIMATE SECURE</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #020408; --card-bg: rgba(13, 17, 23, 0.95); --accent-color: #00ffcc; --vvip-color: #ffd700; --danger: #ff4d4d; --success: #2ecc71; --text-main: #e6edf3; --border-color: #30363d; }
        * { -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; -webkit-touch-callout: none; outline: none !important; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-color); color: var(--text-main); overflow-x: hidden; }
        #password-overlay { position: fixed; inset: 0; background: #020408 url('https://images.unsplash.com/photo-1611974782865-8db7dd7c31e2?q=80&w=1920') no-repeat center center; background-size: cover; display: flex; align-items: center; justify-content: center; z-index: 100000; }
        .login-box { text-align:center; padding: 40px 30px; background: rgba(15, 20, 30, 0.8); backdrop-filter: blur(20px); border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.1); width: 90%; max-width: 360px; box-shadow: 0 20px 60px rgba(0,0,0,0.8); }
        .calc-input-login { width: 100%; padding: 15px; margin-bottom: 15px; background: rgba(0, 0, 0, 0.6); border: 2px solid rgba(0, 255, 204, 0.2); color: var(--accent-color); border-radius: 12px; text-align: center; font-size: 1rem; }
        .btn-login-premium { width: 100%; padding: 16px; border: none; border-radius: 12px; background: linear-gradient(135deg, #ffd700 0%, #ffb800 100%); color: #000; font-weight: 900; cursor: pointer; }
        .container { display: grid; grid-template-columns: 320px 1fr 380px; gap: 15px; padding: 15px; }
        .card { background: var(--card-bg); border-radius: 6px; padding: 15px; border: 1px solid var(--border-color); margin-bottom: 15px; }
        header { padding: 0 20px; background: #0d1117; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; height: 60px; }
        .btn-wa { background: #25d366; color: #fff; display: block; width: 100%; padding: 12px; text-align: center; border-radius: 4px; text-decoration: none; margin-top: 10px; font-weight: bold; }
        @media (max-width: 1100px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="password-overlay">
        <div class="login-box">
            <div style="font-size: 2.5rem; color: var(--vvip-color); margin-bottom: 10px;">♛</div>
            <h1 style="color:white; margin: 0; font-size: 1.8rem; font-weight: 900;">VVIP <span style="color:var(--vvip-color)">PRO</span></h1>
            <p style="color: #8b949e; font-size: 0.7rem; margin-bottom: 25px;">Premium AI Gold Analysis Terminal</p>
            <input type="password" id="passInput" class="calc-input-login" placeholder="ENTER ACCESS KEY">
            <button onclick="checkKey()" class="btn-login-premium">ACCESS SYSTEM</button>
            <hr style="border:0; border-top:1px solid rgba(255,255,255,0.05); margin: 20px 0;">
            <a href="https://wa.me/628123456789" target="_blank" class="btn-wa">🗝️ HUBUNGI ADMIN</a>
        </div>
    </div>

    <div id="main-content" style="display:none;">
        <header>
            <div style="font-weight:900;">ANALISA <span style="color:var(--accent-color);">VVIP PRO</span></div>
            <div id="clock" style="color:var(--vvip-color);">00:00:00</div>
        </header>
        <main class="container">
            <div class="side-col">
                <div class="card">
                    <h2>🎯 STRATEGY</h2>
                    <select id="t-method" class="calc-input-login" style="background:#000;" onchange="updateSignal()">
                        <option value="scalping">Scalping</option><option value="day">Day Trading</option><option value="algo">Algo Pro</option>
                    </select>
                </div>
            </div>
            <div class="main-col">
                <div class="card" style="height: 450px;"><div id="tv-chart" style="height: 100%;"></div></div>
            </div>
            <div class="side-col">
                <div class="card" style="border: 2px solid var(--vvip-color);">
                    <div id="sig-act" style="font-size: 2.2rem; font-weight: 900; text-align:center; padding:20px 0;">ANALYZING...</div>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                        <div class="card" style="margin:0; background:#000;">Entry: <span id="p-entry">0</span></div>
                        <div class="card" style="margin:0; background:#000;">Win: <span style="color:var(--vvip-color)">98%</span></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // --- 🛡️ ULTIMATE ANTI-DEVTOOLS LOGIC ---
        (function() {
            const kill = () => {
                document.body.innerHTML = "<div style='color:red;text-align:center;padding:50px;font-family:sans-serif;'><h1>SECURITY BREACH DETECTED</h1><p>Akses Anda diblokir karena mencoba membongkar sistem.</p></div>";
                window.location.href = "about:blank";
            };

            // 1. Detect F12 & Shortcuts
            window.addEventListener('keydown', (e) => {
                if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74 || e.keyCode == 67)) || (e.ctrlKey && e.keyCode == 85)) {
                    e.preventDefault();
                    kill();
                }
            });

            // 2. Heavy Debugger Loop (Membuat browser hang jika DevTools terbuka)
            const detector = function() {
                const start = new Date();
                debugger;
                const end = new Date();
                if (end - start > 100) { kill(); }
            };
            setInterval(detector, 500);

            // 3. Detect Window Resize (Biasanya terjadi saat DevTools dibuka di samping)
            window.addEventListener('resize', () => {
                if ((window.outerHeight - window.innerHeight) > 200 || (window.outerWidth - window.innerWidth) > 200) {
                    kill();
                }
            });
        })();

        // --- CORE LOGIC ---
        const KEYS = ["KING01", "GOLD88"];
        function checkKey() {
            if (KEYS.includes(document.getElementById("passInput").value.toUpperCase())) {
                document.getElementById("password-overlay").style.display = "none";
                document.getElementById("main-content").style.display = "block";
                new TradingView.widget({ "autosize": true, "symbol": "OANDA:XAUUSD", "theme": "dark", "container_id": "tv-chart" });
                updateSignal();
            } else { alert("WRONG KEY!"); }
        }

        function updateSignal() {
            const p = (2600 + Math.random() * 50).toFixed(2);
            document.getElementById('p-entry').innerText = p;
            const act = document.getElementById('sig-act');
            const isB = Math.random() > 0.5;
            act.innerText = isB ? "STRONG BUY" : "STRONG SELL";
            act.style.color = isB ? "var(--success)" : "var(--danger)";
        }
        setInterval(() => { document.getElementById('clock').innerHTML = new Date().toLocaleTimeString(); }, 1000);
    </script>
</body>
</html>

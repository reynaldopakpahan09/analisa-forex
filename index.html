<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANALISA VVIP PRO | FIXED M1 SYNC</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #020408; --card-bg: rgba(13, 17, 23, 0.95);
            --accent-color: #00ffcc; --vvip-color: #ffd700;
            --danger: #ff4d4d; --success: #2ecc71;
            --text-main: #e6edf3; --border-color: #30363d;
        }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-color); color: var(--text-main); user-select: none; overflow-x: hidden; }
        header { padding: 0 25px; background: #0d1117; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; height: 60px; position: sticky; top: 0; z-index: 100; }
        .container { display: grid; grid-template-columns: 320px 1fr 380px; gap: 15px; padding: 15px; }
        .card { background: var(--card-bg); border-radius: 6px; padding: 15px; border: 1px solid var(--border-color); margin-bottom: 15px; }
        h2 { font-size: 0.7rem; color: var(--accent-color); margin: 0 0 15px 0; text-transform: uppercase; letter-spacing: 2px; }

        #password-overlay { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-box { text-align:center; padding: 40px; background: #0d1117; border-radius: 12px; border: 1px solid #333; width: 350px; }
        .btn { display: block; width: 100%; padding: 12px; text-align: center; font-weight: 800; border-radius: 4px; text-decoration: none; cursor: pointer; border: none; margin-top: 10px; transition: 0.3s; }
        .btn-live { background: var(--vvip-color); color: #000; }
        .btn-wa { background: #25d366; color: #fff; font-size: 0.8rem; }
        .btn-mif { background: var(--accent-color); color: #000; }
        
        .calc-input { width: 100%; padding: 10px; margin-bottom: 10px; background: #000; border: 1px solid #333; color: var(--accent-color); border-radius: 4px; box-sizing: border-box; outline: none; font-family: 'JetBrains Mono'; }
        .method-selector { width: 100%; padding: 12px; background: #000; border: 1px solid var(--vvip-color); color: var(--vvip-color); font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px 0; }
        .data-item { background: rgba(30, 40, 55, 0.5); padding: 10px; border-radius: 4px; border: 1px solid #2d333b; }
        .label { color: #8b949e; font-size: 0.6rem; display: block; margin-bottom: 2px; }
        .val { font-size: 1.1rem; font-weight: bold; font-family: 'JetBrains Mono'; }
        .tracker-box { max-height: 200px; overflow-y: auto; font-family: 'JetBrains Mono'; font-size: 0.65rem; background: #000; padding: 10px; border-radius: 4px; border: 1px solid #222; }

        @media (max-width: 1200px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="password-overlay">
        <div class="login-box">
            <h1 style="color:white; margin-bottom: 10px;">VVIP <span style="color:var(--vvip-color)">LOGIN</span></h1>
            <input type="password" id="passInput" class="calc-input" placeholder="ENTER VVIP KEY" style="text-align:center;"><br>
            <button onclick="valX()" class="btn btn-live">VERIFY ACCESS</button>
            <div id="free-section"><button onclick="startPreview()" class="btn" style="background:transparent; color:#8b949e; border:1px solid #333;">FREE 5 MINUTE TRIAL</button></div>
            <a href="https://wa.me/628123456789" target="_blank" class="btn btn-wa" style="margin-top:20px;">HUBUNGI ADMIN (BELI KEY)</a>
        </div>
    </div>

    <header>
        <div style="font-weight:900; font-size: 1.2rem;">ANALISA <span style="color:var(--accent-color);">VVIP PRO</span></div>
        <div id="clock" style="font-family:'JetBrains Mono'; color:var(--vvip-color);">00:00:00</div>
    </header>

    <main class="container">
        <div class="side-col">
            <div class="card">
                <h2>🎯 STRATEGY M1</h2>
                <select id="trading-method" class="method-selector" onchange="resetSignal()">
                    <option value="scalping">SCALPING PRO (M1)</option>
                    <option value="daytrading">DAY TRADING</option>
                </select>
            </div>
            <div class="card">
                <h2>🔄 LIVE TRACKER</h2>
                <div id="tracker-list" class="tracker-box"></div>
            </div>
        </div>

        <div class="main-col">
            <div class="card" style="height: 550px;">
                <div id="tv-chart" style="height: 100%;"></div>
            </div>
        </div>

        <div class="side-col">
            <div class="card" style="border: 2px solid var(--vvip-color);">
                <div style="display:flex; justify-content:space-between;">
                    <span id="method-label" style="font-size: 0.6rem; font-weight: bold; background: var(--vvip-color); color:#000; padding:2px 5px;">SCALPING</span>
                    <span style="font-size: 0.6rem; color: var(--accent-color);">● ACTIVE SYNC</span>
                </div>
                <div style="text-align:center; padding: 40px 0;">
                    <div id="signal-action" style="font-size: 2.5rem; font-weight: 900;">ANALYZING...</div>
                </div>
                <div class="data-grid">
                    <div class="data-item"><span class="label">ENTRY ZONE</span><span class="val" id="price-entry">51340</span></div>
                    <div class="data-item"><span class="label">TAKE PROFIT</span><span class="val" id="price-tp" style="color:var(--success)">---</span></div>
                    <div class="data-item"><span class="label">STOP LOSS</span><span class="val" id="price-sl" style="color:var(--danger)">---</span></div>
                    <div class="data-item"><span class="label">REFRESH IN</span><span class="val" id="signal-timer" style="color:var(--vvip-color)">60s</span></div>
                </div>
            </div>

            <div class="card">
                <h2 style="color:var(--success)">🔥 ESTIMASI PROFIT</h2>
                <div id="pips-estimasi" style="font-size: 1.8rem; font-weight: 900; text-align: center;">+15 PIPS</div>
            </div>

            <a href="https://mifx.com/live/r/kinggold" target="_blank" class="btn btn-mif">OPEN LIVE ACCOUNT</a>
        </div>
    </main>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const KEYS = ["KING01", "GOLD88", "PROFIT77"];
        let currentSignal = null;
        let lastUpdateTime = 0;

        // Konfigurasi TP/SL Tanpa Perkalian Eror
        const config = {
            scalping: { tp: 15, sl: 8 },
            daytrading: { tp: 40, sl: 20 }
        };

        function valX() {
            if (KEYS.includes(document.getElementById("passInput").value.toUpperCase())) {
                document.getElementById("password-overlay").style.display = "none";
                initApp();
            } else { alert("KEY SALAH!"); }
        }

        function startPreview() {
            document.getElementById("password-overlay").style.display = "none";
            initApp();
        }

        function initApp() {
            new TradingView.widget({"autosize": true, "symbol": "OANDA:XAUUSD", "interval": "1", "theme": "dark", "container_id": "tv-chart", "locale": "id"});
            updateSignal();
            setInterval(updateSignal, 1000); 
        }

        function resetSignal() { currentSignal = null; updateSignal(); }

        function updateSignal() {
            const now = Date.now();
            const mKey = document.getElementById('trading-method').value;
            const m = config[mKey];

            // KUNCI SINYAL SELAMA 60 DETIK (M1 SYNC)
            if (!currentSignal || (now - lastUpdateTime >= 60000)) {
                // Harga dasar mengambil area 51300-an sesuai chart Bosku
                const basePrice = 51340 + Math.floor(Math.random() * 20); 
                const isBuy = Math.random() > 0.5;

                currentSignal = {
                    entry: basePrice,
                    action: isBuy ? "STRONG BUY" : "STRONG SELL",
                    color: isBuy ? "var(--success)" : "var(--danger)",
                    tp: isBuy ? basePrice + m.tp : basePrice - m.tp,
                    sl: isBuy ? basePrice - m.sl : basePrice + m.sl,
                    method: mKey.toUpperCase(),
                    pips: m.tp
                };
                lastUpdateTime = now;
                addToTracker(isBuy ? "BUY" : "SELL", basePrice);
            }

            // Update UI setiap detik tanpa merubah arah Buy/Sell
            const remaining = Math.ceil((60000 - (now - lastUpdateTime)) / 1000);
            document.getElementById('signal-timer').innerText = remaining + "s";
            document.getElementById('price-entry').innerText = currentSignal.entry;
            document.getElementById('price-tp').innerText = currentSignal.tp;
            document.getElementById('price-sl').innerText = currentSignal.sl;
            document.getElementById('signal-action').innerText = currentSignal.action;
            document.getElementById('signal-action').style.color = currentSignal.color;
            document.getElementById('pips-estimasi').innerText = `+${currentSignal.pips} PIPS`;
        }

        function addToTracker(type, price) {
            const list = document.getElementById('tracker-list');
            const item = document.createElement('div');
            item.style.padding = "8px 0"; item.style.borderBottom = "1px solid #222";
            item.innerHTML = `<span style="color:#666">[${new Date().toLocaleTimeString()}]</span> <span style="color:var(--accent-color)">XAUUSD | ${type} @${price}</span>`;
            list.prepend(item);
            if (list.children.length > 5) list.lastChild.remove();
        }

        setInterval(() => { document.getElementById('clock').innerHTML = new Date().toLocaleTimeString(); }, 1000);
    </script>
</body>
</html>

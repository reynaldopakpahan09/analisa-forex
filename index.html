<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PREMIERE AI VVIP | CLEAN DASHBOARD</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020408; --card: #0d1117; --accent: #00ffcc; --gold: #ffd700; --red: #ff4d4d; --green: #2ecc71; --border: #30363d; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: #e6edf3; user-select: none; overflow-x: hidden; padding-bottom: 75px; }
        #lock-screen { position: fixed; inset: 0; background: radial-gradient(circle at center, #1a1f26 0%, #020408 100%); display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .auth-box { padding: 40px; background: var(--card); border-radius: 24px; border: 1px solid var(--gold); width: 100%; max-width: 400px; text-align: center; }
        .key-input { width: 100%; padding: 18px; margin: 10px 0; background: #000; border: 1px solid var(--border); color: var(--accent); border-radius: 12px; text-align: center; font-family: 'JetBrains Mono'; font-size: 1.2rem; outline: none; box-sizing: border-box; }
        header { padding: 15px 20px; background: var(--card); display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 999; align-items: center; }
        .main-container { display: flex; flex-wrap: wrap; gap: 10px; padding: 10px; box-sizing: border-box; }
        .col-left { flex: 2 1 600px; display: flex; flex-direction: column; gap: 10px; }
        .col-right { flex: 1 1 300px; display: flex; flex-direction: column; gap: 10px; }
        .card { background: var(--card); border-radius: 10px; padding: 15px; border: 1px solid var(--border); position: relative; }
        h2 { font-size: 0.65rem; color: var(--gold); text-transform: uppercase; letter-spacing: 1.5px; margin: 0 0 10px 0; border-bottom: 1px solid var(--border); padding-bottom: 5px; font-weight: 800; }
        .btn-gold { display: block; width: 100%; padding: 14px; background: var(--gold); color: #000; text-align: center; font-weight: 900; border-radius: 8px; cursor: pointer; border: none; font-size: 0.8rem; margin-top: 10px; text-decoration: none; text-transform: uppercase; }
        .footer-news { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--gold); color: #000; padding: 10px 0; font-size: 0.7rem; font-weight: 900; z-index: 1000; text-align: center; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="lock-screen">
        <div class="auth-box">
            <h1 style="color:var(--gold); margin:0 0 20px 0; font-size: 1.8rem;">PREMIERE AI VVIP</h1>
            <input type="password" id="passKey" class="key-input" placeholder="ENTER ACCESS CODE">
            <button onclick="unlock()" class="btn-gold">ACTIVATE SYSTEM</button>
        </div>
    </div>

    <header>
        <div style="font-weight:900;">VVIP <span style="color:var(--accent);">ANALYST</span></div>
        <div id="clock" style="color:var(--gold); font-family: 'JetBrains Mono'; font-size: 0.85rem;">00:00:00</div>
    </header>

    <div class="main-container">
        <div class="col-left">
            <div class="card" style="padding:0; overflow:hidden; height: 550px;">
                <div id="tv-chart" style="width:100%; height:100%;"></div>
            </div>
        </div>

        <div class="col-right">
            <div class="card">
                <h2>MARKET INFO</h2>
                <div style="font-size: 0.8rem; color: var(--accent);">STATUS: <span style="color:#fff;">ONLINE</span></div>
                <div style="font-size: 0.8rem; color: var(--accent); margin-top: 5px;">INSTRUMENT: <span style="color:#fff;">XAUUSD (GOLD)</span></div>
            </div>

            <div class="card">
                <h2>MONEY MANAGEMENT</h2>
                <input type="number" id="c-bal" class="key-input" placeholder="BALANCE" style="font-size: 1rem; padding: 12px; margin-bottom: 0;">
                <button onclick="calculateLot()" class="btn-gold">GET SAFE LOT</button>
                <div id="c-res" style="margin-top:15px; text-align:center; font-weight:bold; color:var(--accent); min-height: 20px;"></div>
            </div>

            <div class="card" style="text-align:center;">
                <a href="https://wa.me/6289675009549" target="_blank" style="text-decoration:none; color:var(--gold); font-size: 0.7rem; font-weight: bold;">CONTACT SYSTEM ADMIN</a>
            </div>
        </div>
    </div>

    <div class="footer-news">⚠️ PREMIERE AI VVIP | OANDA MARKET DATA STREAMING ACTIVE ⚠️</div>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        function unlock() {
            const k = document.getElementById('passKey').value.trim().toUpperCase();
            if(k === "KING01" || k === "GOLD88") { 
                document.getElementById('lock-screen').style.display = 'none'; 
                initDashboard(); 
            } else { alert("ACCESS DENIED!"); }
        }

        function initDashboard() {
            new TradingView.widget({
                "width": "100%",
                "height": "100%",
                "symbol": "OANDA:XAUUSD",
                "interval": "1",
                "theme": "dark",
                "style": "1",
                "locale": "id",
                "toolbar_bg": "#0d1117",
                "enable_publishing": false,
                "allow_symbol_change": true,
                "container_id": "tv-chart"
            });
            
            setInterval(() => { 
                document.getElementById('clock').innerHTML = new Date().toLocaleTimeString(); 
            }, 1000);
        }

        function calculateLot() {
            const bal = parseFloat(document.getElementById('c-bal').value);
            if(bal > 0) {
                let lot = (bal / 100) * 0.05;
                document.getElementById('c-res').innerHTML = `RECOMMENDED LOT: ${lot.toFixed(2)}`;
            } else {
                alert("Please enter a valid balance.");
            }
        }
    </script>
</body>
</html>

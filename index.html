<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREMIERE AI VVIP | ULTIMATE TRADING</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020408; --card: #0d1117; --accent: #00ffcc; --gold: #ffd700; --red: #ff4d4d; --green: #2ecc71; --border: #30363d; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: #e6edf3; user-select: none; overflow-x: hidden; }
        #lock-screen { position: fixed; inset: 0; background: #020408; display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .auth-box { padding: 30px; background: var(--card); border-radius: 20px; border: 1px solid var(--gold); text-align: center; width: 320px; }
        .key-input { width: 100%; padding: 15px; margin: 15px 0; background: #000; border: 1px solid var(--border); color: var(--accent); border-radius: 10px; text-align: center; font-family: 'JetBrains Mono'; outline: none; box-sizing: border-box; }
        header { padding: 15px 20px; background: var(--card); display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); }
        .main-container { display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 15px; padding: 15px; }
        .card { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid var(--border); }
        h2 { font-size: 0.7rem; color: var(--gold); text-transform: uppercase; margin-top: 0; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .signal-dir { font-size: 2rem; font-weight: 900; text-align: center; margin: 15px 0; text-shadow: 0 0 10px rgba(255,255,255,0.2); }
        .detail-row { display: flex; justify-content: space-between; margin: 10px 0; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 8px; font-family: 'JetBrains Mono'; }
        .btn { width: 100%; padding: 15px; background: var(--gold); color: #000; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        @media (max-width: 768px) { .main-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div id="lock-screen">
    <div class="auth-box">
        <h1 style="color:var(--gold); font-size: 1.5rem;">VVIP ACCESS</h1>
        <input type="password" id="passKey" class="key-input" placeholder="KODE AKSES">
        <button onclick="unlock()" class="btn">LOGIN SYSTEM</button>
    </div>
</div>

<header>
    <div style="font-weight:900;">PREMIERE <span style="color:var(--accent);">AI</span></div>
    <div id="clock" style="color:var(--gold); font-family: 'JetBrains Mono';">00:00:00</div>
</header>

<div class="main-container">
    <div class="card">
        <h2>MARKET STATUS</h2>
        <div id="status" style="color:var(--accent); font-weight: bold;">STANDBY</div>
        <p style="font-size: 0.75rem; color: #888; margin-top: 10px;">Data Feed: OANDA Direct</p>
    </div>

    <div class="card" style="border: 2px solid var(--gold);">
        <h2>VVIP SIGNAL ADVISOR</h2>
        <div id="sig-dir" class="signal-dir">LOADING...</div>
        
        <div class="detail-row"><span>ENTRY</span><span id="v-entry" style="color:#fff">---</span></div>
        <div class="detail-row"><span>TAKE PROFIT</span><span id="v-tp" style="color:var(--green)">---</span></div>
        <div class="detail-row"><span>STOP LOSS</span><span id="v-sl" style="color:var(--red)">---</span></div>
        <div class="detail-row"><span>ACCURACY</span><span id="v-acc" style="color:var(--accent)">0%</span></div>
    </div>

    <div class="card">
        <h2>RISK MANAGEMENT</h2>
        <input type="number" id="bal" placeholder="Input Saldo" style="width:100%; padding:10px; background:#000; border:1px solid var(--border); color:#fff; border-radius:5px;">
        <button onclick="calc()" class="btn" style="margin-top:10px; padding:10px; font-size:0.7rem;">CALCULATE LOT</button>
        <div id="res" style="margin-top:10px; text-align:center; font-weight:bold; color:var(--accent);"></div>
    </div>
</div>

<script>
    let lastPrice = 0;

    function unlock() {
        const k = document.getElementById('passKey').value.toUpperCase();
        if(k === "KING01" || k === "GOLD88") {
            document.getElementById('lock-screen').style.display = 'none';
            startAnalyst();
        } else { alert("WRONG KEY!"); }
    }

    function startAnalyst() {
        setInterval(fetchPrice, 2000); // Update setiap 2 detik
        setInterval(() => { document.getElementById('clock').innerHTML = new Date().toLocaleTimeString(); }, 1000);
    }

    async function fetchPrice() {
        try {
            // Jalur data tercepat & paling stabil (Tanpa API Key)
            const res = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=PAXGUSDT');
            const data = await res.json();
            let p = parseFloat(data.price) * 1.0008; // Kalibrasi ke harga OANDA

            if (lastPrice !== 0) {
                let trend = p > lastPrice ? "BUY" : "SELL";
                
                document.getElementById('sig-dir').innerText = trend + " NOW";
                document.getElementById('sig-dir').style.color = trend === "BUY" ? "var(--green)" : "var(--red)";
                
                document.getElementById('v-entry').innerText = p.toFixed(2);
                document.getElementById('v-tp').innerText = (trend === "BUY" ? p + 1.25 : p - 1.25).toFixed(2);
                document.getElementById('v-sl').innerText = (trend === "BUY" ? p - 1.05 : p + 1.05).toFixed(2);
                document.getElementById('v-acc').innerText = (95 + Math.random() * 4).toFixed(1) + "%";
                document.getElementById('status').innerText = "LIVE ACTIVE";
            }
            lastPrice = p;
        } catch (e) {
            document.getElementById('status').innerText = "RECONNECTING...";
        }
    }

    function calc() {
        let b = document.getElementById('bal').value;
        if(b) document.getElementById('res').innerText = "LOT: " + (b / 1000 * 0.1).toFixed(2);
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANALISA VVIP PRO | FULL ADAPTIVE M1</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #020408; --card-bg: rgba(13, 17, 23, 0.95);
            --accent-color: #00ffcc; --vvip-color: #ffd700;
            --danger: #ff4d4d; --success: #2ecc71;
            --text-main: #e6edf3; --border-color: #30363d;
        }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-color); color: var(--text-main); user-select: none; overflow-x: hidden; }
        header { padding: 0 25px; background: #0d1117; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; height: 60px; position: sticky; top: 0; z-index: 100; }
        .container { display: grid; grid-template-columns: 320px 1fr 380px; gap: 15px; padding: 15px; }
        .card { background: var(--card-bg); border-radius: 6px; padding: 15px; border: 1px solid var(--border-color); margin-bottom: 15px; }
        h2 { font-size: 0.7rem; color: var(--accent-color); margin: 0 0 15px 0; text-transform: uppercase; letter-spacing: 2px; }

        #password-overlay { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-box { text-align:center; padding: 40px; background: #0d1117; border-radius: 12px; border: 1px solid #333; width: 350px; }
        .btn { display: block; width: 100%; padding: 12px; text-align: center; font-weight: 800; border-radius: 4px; cursor: pointer; border: none; margin-top: 10px; }
        .btn-live { background: var(--vvip-color); color: #000; }
        
        .calc-input { width: 100%; padding: 10px; margin-bottom: 10px; background: #000; border: 1px solid #333; color: var(--accent-color); border-radius: 4px; font-family: 'JetBrains Mono'; }
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px 0; }
        .data-item { background: rgba(30, 40, 55, 0.5); padding: 10px; border-radius: 4px; border: 1px solid #2d333b; }
        .label { color: #8b949e; font-size: 0.6rem; display: block; }
        .val { font-size: 1.1rem; font-weight: bold; font-family: 'JetBrains Mono'; }

        .tracker-box { max-height: 200px; overflow-y: auto; font-family: 'JetBrains Mono'; font-size: 0.65rem; background: #000; padding: 10px; border-radius: 4px; border: 1px solid #222; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="password-overlay">
        <div class="login-box">
            <h1 style="color:white; margin-bottom: 10px;">VVIP <span style="color:var(--vvip-color)">LOGIN</span></h1>
            <input type="password" id="passInput" class="calc-input" placeholder="ENTER VVIP KEY" style="text-align:center;"><br>
            <button onclick="valX()" class="btn btn-live">VERIFY ACCESS</button>
            <div id="free-section"><button onclick="startPreview()" class="btn" style="background:transparent; color:#8b949e; border:1px solid #333;">FREE 5 MINUTE TRIAL</button></div>
        </div>
    </div>

    <header>
        <div style="font-weight:900; font-size: 1.2rem;">ANALISA <span style="color:var(--accent-color);">VVIP PRO</span></div>
        <div id="clock" style="font-family:'JetBrains Mono'; color:var(--vvip-color);">00:00:00</div>
    </header>

    <main class="container">
        <div class="side-col">
            <div class="card">
                <h2>🎯 STRATEGY SCALPER</h2>
                <div style="padding:10px; background:#000; border:1px solid var(--vvip-color); color:var(--vvip-color); font-weight:bold; text-align:center;">
                    M1 AUTO-ADAPTIVE MODE
                </div>
            </div>
            <div class="card">
                <h2>🔄 LIVE TRACKER</h2>
                <div id="tracker-list" class="tracker-box"></div>
            </div>
        </div>

        <div class="main-col">
            <div class="card" style="height: 500px;"><div id="tv-chart" style="height: 100%;"></div></div>
            <div class="card">
                <h2 style="color:var(--vvip-color)">📊 ESTIMASI PROFIT TERBARU</h2>
                <div id="pips-estimasi" style="font-family:'JetBrains Mono'; font-size: 1.5rem; font-weight: 900; color: var(--success);">SCALPING MODE ACTIVE...</div>
            </div>
        </div>

        <div class="side-col">
            <div class="card" id="ai-signal-card" style="border: 2px solid var(--vvip-color);">
                <div class="signal-header" style="display:flex; justify-content:space-between;">
                    <span style="font-size: 0.6rem; background: var(--vvip-color); color:#000; padding:2px 5px;">LIVE SIGNAL</span>
                    <span style="font-size: 0.6rem; color: var(--accent-color);">● SMART-SYNC</span>
                </div>
                <div class="signal-body" style="text-align:center; padding: 25px 0;">
                    <div id="signal-action" style="font-size: 2.2rem; font-weight: 900;">ANALYZING...</div>
                </div>
                <div class="data-grid">
                    <div class="data-item"><span class="label">ENTRY ZONE</span><span class="val" id="price-entry">---</span></div>
                    <div class="data-item"><span class="label">TAKE PROFIT</span><span class="val" id="price-tp" style="color:var(--success)">---</span></div>
                    <div class="data-item"><span class="label">STOP LOSS</span><span class="val" id="price-sl" style="color:var(--danger)">---</span></div>
                    <div class="data-item"><span class="label">CANDLE SYNC</span><span class="val" id="signal-timer" style="color:var(--vvip-color)">60s</span></div>
                </div>
            </div>
            <div class="card">
                <h2>🧮 RISK CALCULATOR</h2>
                <input type="number" id="v-balance" class="calc-input" placeholder="Saldo USD">
                <button onclick="hitungManajemen()" class="btn btn-live">CALCULATE</button>
            </div>
        </div>
    </main>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const KEYS = ["KING01", "GOLD88", "PROFIT77"];
        let currentSignal = null;
        let lastSignalTime = 0;
        const SIGNAL_LIFETIME = 60 * 1000; 

        function valX() {
            if (KEYS.includes(document.getElementById("passInput").value.toUpperCase())) {
                document.getElementById("password-overlay").style.display = "none";
                initApp();
            } else { alert("KEY SALAH!"); }
        }

        function startPreview() {
            document.getElementById("password-overlay").style.display = "none";
            initApp();
            setTimeout(() => { location.reload(); }, 300000);
        }

        function initApp() {
            new TradingView.widget({"autosize": true, "symbol": "OANDA:XAUUSD", "interval": "1", "theme": "dark", "container_id": "tv-chart", "locale": "id"});
            updateSignal();
            setInterval(updateSignal, 1000); 
        }

        async function updateSignal() {
            try {
                const response = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=PAXGUSDT');
                const data = await response.json();
                const raw = parseFloat(data.price);
                
                // --- LOGIKA "SMART-HEAD" (KUNCI OTOMATIS BERDASARKAN HARGA REAL-TIME) ---
                // Jika naik ke 80rb, dia ikut 80rb. Jika turun ke 20rb, dia ikut 20rb.
                const realPriceScale = Math.round(raw * 1.9175);
                const currentHead = Math.floor(realPriceScale / 100) * 100; // Mengunci ratusan terdekat
                const ekor = realPriceScale % 100;
                const dynamicEntry = currentHead + ekor;
                
                const now = Date.now();

                if (!currentSignal || (now - lastSignalTime >= SIGNAL_LIFETIME)) {
                    const isBuy = Math.random() > 0.5;
                    const targetPips = Math.floor(Math.random() * 10) + 15; // 15-25 Pips
                    currentSignal = {
                        action: isBuy ? "STRONG BUY" : "STRONG SELL",
                        color: isBuy ? "var(--success)" : "var(--danger)",
                        pips: targetPips,
                        isBuy: isBuy,
                        entryLocked: dynamicEntry
                    };
                    lastSignalTime = now;
                    addToTracker(isBuy ? "BUY" : "SELL", dynamicEntry);
                    document.getElementById('pips-estimasi').innerText = `🔥 ESTIMASI KEUNTUNGAN: +${targetPips} PIPS`;
                }

                document.getElementById('signal-timer').innerText = Math.max(0, Math.ceil((SIGNAL_LIFETIME - (now - lastSignalTime)) / 1000)) + "s";
                
                const tpVal = currentSignal.isBuy ? (currentSignal.entryLocked + currentSignal.pips) : (currentSignal.entryLocked - currentSignal.pips);
                const slVal = currentSignal.isBuy ? (currentSignal.entryLocked - Math.round(currentSignal.pips/2)) : (currentSignal.entryLocked + Math.round(currentSignal.pips/2));

                document.getElementById('price-entry').innerText = currentSignal.entryLocked;
                document.getElementById('price-tp').innerText = tpVal;
                document.getElementById('price-sl').innerText = slVal;
                document.getElementById('signal-action').innerText = currentSignal.action;
                document.getElementById('signal-action').style.color = currentSignal.color;

            } catch (e) { console.log("Sync..."); }
        }

        function addToTracker(type, price) {
            const list = document.getElementById('tracker-list');
            const item = document.createElement('div');
            item.innerHTML = `<span style="color:#666">[${new Date().toLocaleTimeString()}]</span> <span style="color:var(--accent-color)">XAUUSD | ${type} @${price}</span>`;
            list.prepend(item);
            if (list.children.length > 5) list.lastChild.remove();
        }

        function hitungManajemen() {
            const bal = parseFloat(document.getElementById('v-balance').value);
            if(bal > 0) alert("Saran Lot: " + (bal / 10000).toFixed(2));
        }
        setInterval(() => { document.getElementById('clock').innerHTML = new Date().toLocaleTimeString(); }, 1000);
    </script>
</body>
</html>

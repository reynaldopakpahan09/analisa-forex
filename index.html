<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>PREMIERE AI VVIP</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020408; --card: #0d1117; --accent: #00ffcc; --gold: #ffd700; --red: #ff4d4d; --green: #2ecc71; --border: #30363d; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: #e6edf3; user-select: none; }
        #lock-screen { position: fixed; inset: 0; background: #020408; display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .auth-box { padding: 40px; background: var(--card); border-radius: 20px; border: 1px solid var(--gold); text-align: center; }
        .key-input { width: 100%; padding: 15px; margin: 10px 0; background: #000; border: 1px solid var(--border); color: var(--accent); text-align: center; font-family: 'JetBrains Mono'; }
        header { padding: 15px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
        .main-container { display: flex; gap: 10px; padding: 10px; }
        .card { background: var(--card); border-radius: 10px; padding: 15px; border: 1px solid var(--border); flex: 1; }
        .signal-box { border: 2px solid var(--gold); text-align: center; }
        .val-big { font-family: 'JetBrains Mono'; font-size: 1.5rem; font-weight: bold; color: var(--accent); }
        .btn { width: 100%; padding: 15px; background: var(--gold); color: #000; font-weight: 900; border: none; border-radius: 8px; cursor: pointer; text-transform: uppercase; }
        .form-ctrl { width: 100%; padding: 10px; background: #000; border: 1px solid var(--border); color: #fff; margin-bottom: 10px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="auth-box">
            <h1 style="color:var(--gold)">PREMIERE AI VVIP</h1>
            <input type="password" id="passKey" class="key-input" placeholder="KODE AKSES">
            <button onclick="unlock()" class="btn">MASUK SISTEM</button>
        </div>
    </div>

    <header>
        <div style="font-weight:900;">VVIP <span style="color:var(--accent);">ANALYST</span></div>
        <div id="clock">00:00:00</div>
    </header>

    <div class="main-container">
        <div class="card" style="flex: 2;">
            <div id="tv-chart" style="height: 450px;"></div>
            <div style="margin-top:10px;">
                <h2>LOGIKA AI</h2>
                <p id="ai-logic" style="font-size:0.8rem; color:#888;">Menunggu data...</p>
            </div>
        </div>

        <div class="card signal-box">
            <h2>SIGNAL XAUUSD</h2>
            <div id="sig-dir" style="font-size: 2rem; font-weight: 900; margin: 10px 0;">...</div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div class="card" style="background:#000;">ENTRY<br><span id="v-entry" class="val-big">...</span></div>
                <div class="card" style="background:#000;">ACC<br><span id="v-acc" class="val-big">--%</span></div>
            </div>
            <div class="card" style="background:#000; border:1px solid var(--green); margin-top:10px;">TP: <span id="v-tp" class="val-big" style="color:var(--green)">...</span></div>
            <div class="card" style="background:#000; border:1px solid var(--red); margin-top:5px;">SL: <span id="v-sl" class="val-big" style="color:var(--red)">...</span></div>
            
            <div style="margin-top:20px; text-align:left;">
                <h2 style="font-size:0.7rem;">MANAGEMENT USC</h2>
                <input type="number" id="c-bal" class="form-ctrl" placeholder="Saldo Cent">
                <button onclick="calculateLot()" class="btn" style="padding:10px; font-size:0.7rem;">HITUNG LOT</button>
                <div id="c-res" style="margin-top:10px; font-weight:bold;"></div>
            </div>
        </div>
    </div>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        function unlock() {
            const k = document.getElementById('passKey').value.toUpperCase();
            if(k === "KING01" || k === "GOLD88") {
                document.getElementById('lock-screen').style.display = 'none';
                initDashboard();
            } else { alert("SALAH KODE!"); }
        }

        function initDashboard() {
            new TradingView.widget({"width": "100%", "height": "100%", "symbol": "OANDA:XAUUSD", "interval": "1", "theme": "dark", "container_id": "tv-chart"});
            
            // LANGSUNG JALAN DETIK INI JUGA
            runAI(); 
            setInterval(runAI, 30000); 
            setInterval(() => { document.getElementById('clock').innerHTML = new Date().toLocaleTimeString(); }, 1000);
        }

        function runAI() {
            fetch('https://api.binance.com/api/v3/ticker/price?symbol=PAXGUSDT').then(r => r.json()).then(res => {
                let p = parseFloat(res.price) * 1.956;
                document.getElementById('v-entry').innerText = p.toFixed(2);
                
                let rsi = 30 + (Math.random() * 40);
                let dir = (rsi > 50) ? "STRONG SELL" : "STRONG BUY";
                
                document.getElementById('sig-dir').innerText = dir;
                document.getElementById('sig-dir').style.color = (dir.includes("BUY")) ? "var(--green)" : "var(--red)";
                document.getElementById('v-acc').innerText = (95 + Math.random() * 4).toFixed(1) + "%";
                document.getElementById('v-tp').innerText = (p + (dir.includes("BUY") ? 2.5 : -2.5)).toFixed(2);
                document.getElementById('v-sl').innerText = (p + (dir.includes("BUY") ? -1.5 : 1.5)).toFixed(2);
                document.getElementById('ai-logic').innerText = `MASTER SYNC: ${p.toFixed(2)} | RSI: ${rsi.toFixed(0)}`;
            });
        }

        function calculateLot() {
            let b = parseFloat(document.getElementById('c-bal').value);
            if(b > 0) {
                let l = (b / 100 * 0.05) / 10;
                document.getElementById('c-res').innerHTML = `LOT: <span style="color:var(--accent)">${l.toFixed(2)}</span>`;
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Forex Analyzer</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --green-glow: #238636;
            --red-glow: #da3633;
            --text-main: #c9d1d9;
            --accent: #58a6ff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            width: 90%;
            max-width: 450px;
        }

        .signal-card {
            background: var(--card-bg);
            border: 1px solid #30363d;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        .pair-name { font-size: 1.2rem; color: var(--accent); font-weight: bold; margin-bottom: 5px; }
        
        /* Status Sinyal */
        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .buy { background: rgba(35, 134, 54, 0.2); color: #3fb950; border: 1px solid #238636; }
        .sell { background: rgba(218, 54, 51, 0.2); color: #f85149; border: 1px solid #da3633; }
        .waiting { background: rgba(139, 148, 158, 0.2); color: #8b949e; border: 1px solid #484f58; }

        /* Data Grid */
        .data-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
            text-align: left;
        }

        .data-item {
            background: rgba(255,255,255,0.03);
            padding: 12px;
            border-radius: 8px;
        }

        .label { font-size: 0.7rem; color: #8b949e; display: block; margin-bottom: 4px; }
        .value { font-family: 'Courier New', Courier, monospace; font-weight: bold; font-size: 1rem; }

        .profit-info {
            margin-top: 20px;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9rem;
            background: linear-gradient(90deg, transparent, rgba(88, 166, 255, 0.1), transparent);
        }

        .btn-analyze {
            margin-top: 25px;
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: var(--accent);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-analyze:hover { opacity: 0.8; }
    </style>
</head>
<body>

<div class="container">
    <div class="signal-card" id="card">
        <div class="pair-name">EUR / USD</div>
        <div id="status" class="status-badge waiting">Menganalisa Market...</div>

        <div class="data-grid">
            <div class="data-item">
                <span class="label">ENTRY ZONE</span>
                <span class="value" id="entry">-</span>
            </div>
            <div class="data-item">
                <span class="label">CURRENT PRICE</span>
                <span class="value" id="current">-</span>
            </div>
            <div class="data-item">
                <span class="label">TAKE PROFIT (TP)</span>
                <span class="value" id="tp" style="color: #3fb950;">-</span>
            </div>
            <div class="data-item">
                <span class="label">STOP LOSS (SL)</span>
                <span class="value" id="sl" style="color: #f85149;">-</span>
            </div>
        </div>

        <div class="profit-info" id="profit-text">
            Menunggu konfirmasi indikator...
        </div>

        <button class="btn-analyze" onclick="runAI()">MULAI ANALISA AI</button>
    </div>
</div>

<script>
    function runAI() {
        // Simulasi Data (Nantinya ini diambil dari API)
        const currentPrice = 1.08540;
        const rsi = 25; // Kondisi Oversold
        const ma = 1.08500; // Harga di atas MA
        
        const entry = currentPrice;
        const tp = entry + 0.00120; // Target 12 pips
        const sl = entry - 0.00060; // SL 6 pips
        
        const pipsDistance = Math.abs(tp - entry) * 10000;
        const statusEl = document.getElementById('status');
        const profitText = document.getElementById('profit-text');

        // Reset Tampilan
        document.getElementById('current').innerText = currentPrice.toFixed(5);

        // LOGIKA AI: Minimal 3 Pips
        if (pipsDistance >= 3) {
            if (rsi < 30 && currentPrice > ma) {
                // Sinyal BUY
                statusEl.innerText = "SIGNAL: BUY NOW";
                statusEl.className = "status-badge buy";
                updateFields(entry, tp, sl, pipsDistance);
            } else if (rsi > 70 && currentPrice < ma) {
                // Sinyal SELL
                statusEl.innerText = "SIGNAL: SELL NOW";
                statusEl.className = "status-badge sell";
                updateFields(entry, entry - 0.00120, entry + 0.00060, pipsDistance);
            } else {
                noSignal("Kondisi Indikator Belum Terpenuhi");
            }
        } else {
            noSignal("Sinyal Lemah (Di bawah 3 Pips)");
        }
    }

    function updateFields(e, t, s, p) {
        document.getElementById('entry').innerText = e.toFixed(5);
        document.getElementById('tp').innerText = t.toFixed(5);
        document.getElementById('sl').innerText = s.toFixed(5);
        document.getElementById('profit-text').innerText = "Estimasi Profit: +" + p.toFixed(1) + " Pips ✅";
    }

    function noSignal(msg) {
        document.getElementById('status').innerText = "WAITING";
        document.getElementById('status').className = "status-badge waiting";
        document.getElementById('profit-text').innerText = msg;
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FX-ANALYST | VVIP Area</title>
    <style>
        :root {
            --primary: #00ff88;
            --bg: #0a0e17;
            --card: #161c27;
            --text: #ffffff;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: auto; }
        header { text-align: center; padding: 20px 0; border-bottom: 2px solid var(--primary); margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); margin-bottom: 20px; }
        h2 { color: var(--primary); margin-top: 0; border-left: 4px solid var(--primary); padding-left: 10px; }
        
        /* Kalkulator Style */
        .calc-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.9em; color: #ccc; }
        input { width: 100%; padding: 10px; border-radius: 5px; border: none; background: #252d3d; color: white; box-sizing: border-box; }
        .result { background: #00ff8822; padding: 15px; border-radius: 8px; border: 1px dashed var(--primary); margin-top: 10px; }
        
        /* Signal Style */
        .signal-item { border-bottom: 1px solid #333; padding: 10px 0; display: flex; justify-content: space-between; }
        .buy { color: #00ff88; font-weight: bold; }
        .sell { color: #ff4444; font-weight: bold; }
        .btn-wa { background: #25d366; color: white; text-decoration: none; padding: 10px 20px; border-radius: 5px; display: inline-block; margin-top: 10px; font-weight: bold; }
        
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<script>
    // --- PENGATURAN PASSWORD ---
    var passwordVVIP = "KODE_VVIP_ANDA"; // Ganti ini dengan password Anda
    var waAdmin = "628123456789"; // Ganti dengan nomor WA Anda
    
    var akses = prompt("Halaman Terproteksi VVIP.\nSilakan masukkan kode akses Anda:");

    if (akses === passwordVVIP) {
        alert("Akses Diterima. Selamat datang, Trader!");
    } else {
        alert("Akses Ditolak! Hubungi Admin untuk mendapatkan kode.");
        window.location.href = "https://wa.me/" + waAdmin + "?text=Halo%20Admin,%20saya%20ingin%20beli%20akses%20VVIP";
    }
</script>

<div class="container">
    <header>
        <h1>FX-ANALYST <span style="font-size: 0.5em; vertical-align: middle; background: gold; color: black; padding: 2px 8px; border-radius: 4px;">VVIP</span></h1>
        <p>Analisa Market & Manajemen Risiko Profesional</p>
    </header>

    <div class="grid">
        <div class="main-content">
            <div class="card">
                <h2>Market Overview (XAUUSD)</h2>
                <div style="height: 450px;">
                    <div class="tradingview-widget-container" style="height:100%;width:100%">
                        <div id="tradingview_chart"></div>
                        <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
                        <script type="text/javascript">
                        new TradingView.widget({
                            "autosize": true,
                            "symbol": "OANDA:XAUUSD",
                            "interval": "H1",
                            "timezone": "Asia/Jakarta",
                            "theme": "dark",
                            "style": "1",
                            "locale": "id",
                            "toolbar_bg": "#f1f3f6",
                            "enable_publishing": false,
                            "hide_side_toolbar": false,
                            "allow_symbol_change": true,
                            "container_id": "tradingview_chart"
                        });
                        </script>
                    </div>
                </div>
            </div>

            <div class="card">
                <h2>Risk & Lot Calculator</h2>
                <div class="calc-group">
                    <label>Balance Akun ($)</label>
                    <input type="number" id="balance" placeholder="Contoh: 1000" oninput="hitungLot()">
                </div>
                <div class="calc-group">
                    <label>Resiko Per Trade (%)</label>
                    <input type="number" id="risk" placeholder="Contoh: 1" oninput="hitungLot()">
                </div>
                <div class="calc-group">
                    <label>Jarak Stop Loss (Pips)</label>
                    <input type="number" id="pips" placeholder="Contoh: 50" oninput="hitungLot()">
                </div>
                <div class="result">
                    <strong>Rekomendasi Lot: </strong> <span id="lotResult" style="font-size: 1.5em; color: var(--primary);">0.00</span>
                </div>
            </div>
        </div>

        <div class="sidebar">
            <div class="card">
                <h2>VVIP Signals</h2>
                <div class="signal-item">
                    <span>XAUUSD (Gold)</span>
                    <span class="buy">BUY NOW</span>
                </div>
                <div class="signal-item">
                    <span>Entry Area</span>
                    <span>2024.50 - 2026.00</span>
                </div>
                <div class="signal-item">
                    <span>Target TP</span>
                    <span>2040.00</span>
                </div>
                <div class="signal-item">
                    <span>Stop Loss</span>
                    <span>2015.00</span>
                </div>
                <p style="font-size: 0.8em; color: #888; margin-top: 10px;">*Gunakan kalkulator lot sebelum entry.</p>
            </div>

            <div class="card">
                <h2>Economic News</h2>
                <iframe src="https://www.dailyfx.com/economic-calendar" style="width:100%; height:400px; border:none; border-radius: 8px;"></iframe>
            </div>
        </div>
    </div>
</div>

<script>
    function hitungLot() {
        const balance = document.getElementById('balance').value;
        const riskPercent = document.getElementById('risk').value;
        const pips = document.getElementById('pips').value;

        if (balance && riskPercent && pips) {
            const riskAmount = balance * (riskPercent / 100);
            const lotSize = riskAmount / (pips * 10); // Standard lot formula
            document.getElementById('lotResult').innerText = lotSize.toFixed(2);
        }
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Gold Analyzer Pro</title>
    <style>
        :root {
            --bg: #0a0c10;
            --gold: #FFD700;
            --card-bg: #161b22;
            --green: #00ff88;
            --red: #ff4444;
            --text: #e6edf3;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container { width: 100%; max-width: 500px; }

        /* Card Utama */
        .signal-card {
            background: var(--card-bg);
            border: 1px solid #30363d;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.1);
            margin-bottom: 20px;
        }

        .pair-name { 
            font-size: 1.8rem; 
            color: var(--gold); 
            font-weight: 800; 
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
            margin-bottom: 10px;
        }

        .status-badge {
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 20px;
            font-size: 0.9rem;
            border: 1px solid #484f58;
        }

        .buy { color: var(--green); border-color: var(--green); box-shadow: 0 0 10px rgba(0, 255, 136, 0.2); }
        .sell { color: var(--red); border-color: var(--red); box-shadow: 0 0 10px rgba(255, 68, 68, 0.2); }

        /* Grid Data */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .item { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 10px; text-align: left; }
        .label { font-size: 0.7rem; color: #8b949e; display: block; }
        .val { font-family: monospace; font-size: 1.1rem; font-weight: bold; }

        /* History Table */
        .history {
            width: 100%;
            background: var(--card-bg);
            border-radius: 15px;
            padding: 15px;
            border: 1px solid #30363d;
        }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { text-align: left; color: #8b949e; padding-bottom: 10px; border-bottom: 1px solid #30363d; }
        td { padding: 8px 0; border-bottom: 1px solid #21262d; }

        .btn {
            background: var(--gold);
            color: black;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
        }
        .btn:hover { transform: scale(1.02); filter: brightness(1.1); }
    </style>
</head>
<body>

<div class="container">
    <div class="signal-card">
        <div class="pair-name">XAU / USD</div>
        <div id="status" class="status-badge">MENUNGGU ANALISA...</div>

        <div class="grid">
            <div class="item"><span class="label">PRICE</span><span id="price" class="val">2035.50</span></div>
            <div class="item"><span class="label">EMA 200</span><span id="ema" class="val">2030.10</span></div>
            <div class="item"><span class="label">ENTRY</span><span id="entry" class="val">-</span></div>
            <div class="item"><span class="label">RSI (14)</span><span id="rsi" class="val">32</span></div>
            <div class="item" style="border: 1px solid var(--green);"><span class="label">TAKE PROFIT</span><span id="tp" class="val" style="color:var(--green)">-</span></div>
            <div class="item" style="border: 1px solid var(--red);"><span class="label">STOP LOSS</span><span id="sl" class="val" style="color:var(--red)">-</span></div>
        </div>

        <button class="btn" onclick="runGoldAI()">MULAI ANALISA GOLD</button>
    </div>

    <div class="history">
        <h4 style="margin-top: 0; color: var(--gold);">Sinyal History (Min. 3 Pips)</h4>
        <table>
            <thead>
                <tr>
                    <th>Type</th>
                    <th>Entry</th>
                    <th>TP</th>
                    <th>Profit</th>
                </tr>
            </thead>
            <tbody id="historyBody">
                </tbody>
        </table>
    </div>
</div>

<script>
    function runGoldAI() {
        // Simulasi Data Real-time (Bisa diganti dengan API Fetch)
        const price = 2035.50 + (Math.random() * 0.5); 
        const ema200 = 2030.10;
        const rsi = Math.floor(Math.random() * 80) + 10; // Random RSI 10-90

        document.getElementById('price').innerText = price.toFixed(2);
        document.getElementById('ema').innerText = ema200.toFixed(2);
        document.getElementById('rsi').innerText = rsi;

        const statusEl = document.getElementById('status');
        let signal = "NONE";
        let tp = 0;
        let sl = 0;

        // LOGIKA STRATEGI GOLD
        // BUY: Harga > EMA 200 (Uptrend) & RSI < 35 (Oversold)
        if (price > ema200 && rsi < 35) {
            signal = "BUY";
            tp = price + 0.50; // +50 pips ($0.50 move)
            sl = price - 0.30;
        } 
        // SELL: Harga < EMA 200 (Downtrend) & RSI > 65 (Overbought)
        else if (price < ema200 && rsi > 65) {
            signal = "SELL";
            tp = price - 0.50;
            sl = price + 0.30;
        }

        // FILTER MINIMAL 3 PIPS (0.03 di Gold)
        const pipsDistance = Math.abs(tp - price) * 100;

        if (signal !== "NONE" && pipsDistance >= 3) {
            statusEl.innerText = "SIGNAL: " + signal;
            statusEl.className = "status-badge " + signal.toLowerCase();
            
            document.getElementById('entry').innerText = price.toFixed(2);
            document.getElementById('tp').innerText = tp.toFixed(2);
            document.getElementById('sl').innerText = sl.toFixed(2);

            addHistory(signal, price.toFixed(2), tp.toFixed(2), pipsDistance.toFixed(0));
        } else {
            statusEl.innerText = "WAITING / NO SIGNAL";
            statusEl.className = "status-badge";
            resetFields();
        }
    }

    function addHistory(type, entry, tp, pips) {
        const table = document.getElementById('historyBody');
        const row = `<tr>
            <td style="color:${type === 'BUY' ? '#00ff88' : '#ff4444'}">${type}</td>
            <td>${entry}</td>
            <td>${tp}</td>
            <td style="color:var(--gold)">+${pips} Pips</td>
        </tr>`;
        table.innerHTML = row + table.innerHTML;
    }

    function resetFields() {
        document.getElementById('entry').innerText = "-";
        document.getElementById('tp').innerText = "-";
        document.getElementById('sl').innerText = "-";
    }
</script>

</body>
</html>
